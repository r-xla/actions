on:
  workflow_call:
    inputs:
      extra-repositories:
        type: string
        default: 'https://r-xla.r-universe.dev'
      setup-pjrt:
        type: boolean
        default: false

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: ${{ inputs.extra-repositories }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, cuda12.8=?ignore
          needs: website

      - name: Install package
        run: R CMD INSTALL .

      - name: Download CPU plugin
        if: ${{ inputs.setup-pjrt }}
        run: Rscript -e "pjrt::pjrt_client('cpu')"

      - name: Build site (PR)
        if: github.event_name == 'pull_request'
        run: Rscript -e 'pkgdown::build_site(new_process = FALSE)'

      - name: Deploy package
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'
