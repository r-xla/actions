on:
  workflow_call:
    inputs:
      extra-repositories:
        type: string
        default: 'https://r-xla.r-universe.dev'
      exclusions:
        type: string
        default: ''
        description: 'R expressions for lint_package() exclusions, e.g. "\"dir\", \"file.R\""'

name: Lint R Code

jobs:
  r-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: ${{ inputs.extra-repositories }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint
          cache: false

      - name: Lint R Code
        run: lintr::lint_package(exclusions = list(${{ inputs.exclusions }}))
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
